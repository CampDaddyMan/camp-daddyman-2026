name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  typecheck:
    name: TypeScript check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=apps/api/prisma/schema.prisma

      - name: Typecheck API
        run: npx tsc --noEmit
        working-directory: apps/api

      - name: Typecheck Web
        run: npx tsc --noEmit
        working-directory: apps/web

  build-api:
    name: Build API
    runs-on: ubuntu-latest
    needs: typecheck

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=apps/api/prisma/schema.prisma

      - name: Build API
        run: npm run build --workspace=apps/api

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: typecheck
    env:
      NEXT_PUBLIC_API_URL: https://api.campdaddyman.com/api
      NEXT_PUBLIC_SITE_URL: https://campdaddyman.com

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Web
        run: npm run build --workspace=apps/web

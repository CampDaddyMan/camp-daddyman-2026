name: DB Backup

# Nightly Postgres -> Cloudflare R2 backup, run by GitHub Actions so it does NOT
# depend on a running app instance (Cloud Run scales to zero / has no pg_dump).
#
# Required repository secrets:
#   DATABASE_URL, R2_ACCOUNT_ID, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_BUCKET,
#   RESEND_API_KEY, BACKUP_ALERT_TO   (email to notify on failure)
# Optional secret:
#   EMAIL_FROM  (verified Resend sender; defaults to the resend.dev sandbox sender,
#                which can only deliver to the Resend account owner's address)

on:
  schedule:
    - cron: '0 7 * * *'      # ~03:00 US Eastern (EDT). GitHub cron is UTC and may be delayed.
  workflow_dispatch: {}       # allow manual "Run workflow" from the Actions tab

concurrency:
  group: db-backup
  cancel-in-progress: false

jobs:
  backup:
    name: Nightly Postgres -> R2
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install pg_dump 17 (PGDG)
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          /usr/lib/postgresql/17/bin/pg_dump --version

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install backup script deps
        working-directory: scripts/db-backup
        run: npm install --no-audit --no-fund

      - name: Run backup
        working-directory: scripts/db-backup
        env:
          DATABASE_URL:         ${{ secrets.DATABASE_URL }}
          R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET:            ${{ secrets.R2_BUCKET }}
          PG_DUMP:              /usr/lib/postgresql/17/bin/pg_dump
        run: node backup.mjs

      - name: Alert on failure (Resend)
        if: failure()
        env:
          RESEND_API_KEY:   ${{ secrets.RESEND_API_KEY }}
          BACKUP_ALERT_TO:  ${{ secrets.BACKUP_ALERT_TO }}
          EMAIL_FROM:       ${{ secrets.EMAIL_FROM }}
          RUN_URL:          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          export FROM="${EMAIL_FROM:-Camp DaddyMan <onboarding@resend.dev>}"
          if [ -z "$RESEND_API_KEY" ] || [ -z "$BACKUP_ALERT_TO" ]; then
            echo "::warning::RESEND_API_KEY or BACKUP_ALERT_TO not set — cannot send alert."
            exit 0
          fi
          PAYLOAD=$(node -e 'console.log(JSON.stringify({
                from: process.env.FROM,
                to: [process.env.BACKUP_ALERT_TO],
                subject: "⚠️ Camp DaddyMan DB backup FAILED",
                text: "The nightly database backup failed.\n\nRun: " + process.env.RUN_URL + "\n\nCheck the logs and run the workflow manually once fixed."
              }))')
          curl -sS -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
          echo "Failure alert sent to $BACKUP_ALERT_TO"

name: Deploy

on:
  push:
    branches: [master]

jobs:
  # ── Detect which parts of the repo changed ──────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      api:    ${{ steps.filter.outputs.api }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
            mobile:
              - 'apps/mobile/**'

  # ── API → Cloud Run ──────────────────────────────────────────────────────────
  deploy-api:
    name: API → Cloud Run
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            us-central1-docker.pkg.dev/camp-daddyman-2026/camp-daddyman/api:latest
            us-central1-docker.pkg.dev/camp-daddyman-2026/camp-daddyman/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: camp-daddyman-api
          image: us-central1-docker.pkg.dev/camp-daddyman-2026/camp-daddyman/api:${{ github.sha }}
          region: us-central1

  # ── Mobile → EAS OTA ─────────────────────────────────────────────────────────
  deploy-mobile-ota:
    name: Mobile → EAS OTA
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Install dependencies
        working-directory: apps/mobile
        run: npm install

      - name: EAS Update — Android
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          CI: "1"
        run: eas update --branch production --platform android --message "${{ github.event.head_commit.message }}"

      - name: EAS Update — iOS
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          CI: "1"
        run: eas update --branch production --platform ios --message "${{ github.event.head_commit.message }}"
